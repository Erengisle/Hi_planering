<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base target="_top">
  <title>Klassens ord</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080814;
      color: white;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 40px 56px;
      overflow-x: hidden;
    }

    /* ── Starfield ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      border-radius: 50%;
      animation: twinkle var(--d) var(--delay) infinite ease-in-out;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50%       { opacity: var(--o); }
    }

    /* ── Layout ── */
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 52px;
      gap: 40px;
    }

    .title {
      font-size: 2.2rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      background: linear-gradient(110deg, #c084fc, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .total-block {
      text-align: right;
      flex-shrink: 0;
    }
    .total-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: #64748b;
      margin-bottom: 4px;
    }
    .total-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      justify-content: flex-end;
    }
    .total-number {
      font-size: 5.5rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #fbbf24, #f87171);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: transform 0.25s ease;
    }
    .total-number.pop {
      transform: scale(1.08);
    }
    .total-unit {
      font-size: 1.6rem;
      font-weight: 700;
      color: #475569;
      padding-bottom: 6px;
    }

    /* ── Leaderboard ── */
    .leaderboard {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .row {
      display: grid;
      grid-template-columns: 64px minmax(160px, 260px) 1fr 140px;
      align-items: center;
      gap: 20px;
      padding: 20px 28px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      transition: background 0.4s, border-color 0.4s;
    }

    .row.rank-1 {
      background: rgba(251,191,36,0.08);
      border-color: rgba(251,191,36,0.25);
    }
    .row.rank-2 {
      background: rgba(148,163,184,0.07);
      border-color: rgba(148,163,184,0.2);
    }
    .row.rank-3 {
      background: rgba(234,153,102,0.07);
      border-color: rgba(234,153,102,0.2);
    }

    .rank-badge {
      font-size: 2rem;
      text-align: center;
      line-height: 1;
    }
    .rank-num {
      font-size: 1.4rem;
      font-weight: 700;
      color: #334155;
      text-align: center;
    }

    .name {
      font-size: 1.55rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bar-wrap {
      background: rgba(255,255,255,0.07);
      border-radius: 999px;
      height: 18px;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      border-radius: 999px;
      min-width: 8px;
      width: 0%;
      transition: width 1.1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .count-cell {
      text-align: right;
    }
    .count-num {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }
    .count-unit {
      font-size: 0.9rem;
      color: #475569;
      font-weight: 500;
      margin-left: 4px;
    }

    /* ── Bar color palette ── */
    .c0  { background: linear-gradient(90deg,#f472b6,#ec4899); }
    .c1  { background: linear-gradient(90deg,#fb923c,#ef4444); }
    .c2  { background: linear-gradient(90deg,#facc15,#f97316); }
    .c3  { background: linear-gradient(90deg,#4ade80,#10b981); }
    .c4  { background: linear-gradient(90deg,#22d3ee,#3b82f6); }
    .c5  { background: linear-gradient(90deg,#818cf8,#8b5cf6); }
    .c6  { background: linear-gradient(90deg,#c084fc,#f472b6); }
    .c7  { background: linear-gradient(90deg,#2dd4bf,#22d3ee); }
    .c8  { background: linear-gradient(90deg,#fda4af,#fb923c); }
    .c9  { background: linear-gradient(90deg,#a3e635,#4ade80); }
    .c10 { background: linear-gradient(90deg,#60a5fa,#818cf8); }
    .c11 { background: linear-gradient(90deg,#f9a8d4,#c084fc); }

    /* ── Gold pulse on top row ── */
    @keyframes gold-pulse {
      0%, 100% { box-shadow: 0 0 0px rgba(251,191,36,0); }
      50%       { box-shadow: 0 0 32px rgba(251,191,36,0.18); }
    }
    .row.rank-1 { animation: gold-pulse 2.4s ease-in-out infinite; }

    /* ── "+N" pop floaters ── */
    .floater {
      position: fixed;
      font-size: 2.4rem;
      font-weight: 900;
      color: #fbbf24;
      text-shadow: 0 0 20px rgba(251,191,36,0.7);
      pointer-events: none;
      z-index: 200;
      animation: float-up 1.1s ease-out forwards;
    }
    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0)   scale(1); }
      100% { opacity: 0; transform: translateY(-90px) scale(1.4); }
    }

    /* ── Refresh ring ── */
    .refresh-ring {
      position: fixed;
      bottom: 28px;
      right: 32px;
      width: 44px;
      height: 44px;
      opacity: 0.6;
    }
    .ring-track    { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 4; }
    .ring-progress {
      fill: none;
      stroke: #818cf8;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 113;
      stroke-dashoffset: 0;
      transform-origin: 50% 50%;
      transform: rotate(-90deg);
      transition: stroke-dashoffset 1s linear;
    }

    /* ── Empty / loading ── */
    .empty {
      text-align: center;
      padding: 80px 0;
      color: #334155;
      font-size: 1.4rem;
    }

    /* ── Divider line ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      margin: 4px 0 18px;
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="wrap">
    <div class="header">
      <div>
        <div class="title">Klassens ord</div>
        <div style="margin-top:8px;font-size:0.85rem;color:#334155;letter-spacing:0.05em">Uppdateras live var 20:e sekund</div>
      </div>
      <div class="total-block">
        <div class="total-label">Totalt inlämnade</div>
        <div class="total-row">
          <div class="total-number" id="total">–</div>
          <div class="total-unit">ord</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>
    <div class="leaderboard" id="board">
      <div class="empty">Laddar...</div>
    </div>
  </div>

  <svg class="refresh-ring" viewBox="0 0 44 44">
    <circle class="ring-track"    cx="22" cy="22" r="18"/>
    <circle class="ring-progress" id="ring" cx="22" cy="22" r="18"/>
  </svg>

  <script>
    /* ── Starfield ── */
    (function() {
      const cont = document.getElementById('stars');
      for (let i = 0; i < 100; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const sz = Math.random() < 0.6 ? 1 : 2;
        s.style.cssText = [
          'width:' + sz + 'px',
          'height:' + sz + 'px',
          'left:' + (Math.random() * 100) + '%',
          'top:' + (Math.random() * 100) + '%',
          '--d:' + (2 + Math.random() * 5).toFixed(1) + 's',
          '--delay:-' + (Math.random() * 5).toFixed(1) + 's',
          '--o:' + (0.3 + Math.random() * 0.6).toFixed(2),
          'background:white'
        ].join(';');
        cont.appendChild(s);
      }
    })();

    /* ── Constants ── */
    const MEDALS      = ['🥇','🥈','🥉'];
    const INTERVAL_MS = 20000;
    const RING_CIRC   = 2 * Math.PI * 18;

    let prevTotal = 0;
    let ringTimer;

    /* ── Refresh ring ── */
    function startRing() {
      clearInterval(ringTimer);
      const ring = document.getElementById('ring');
      ring.style.strokeDashoffset = '0';
      let elapsed = 0;
      ringTimer = setInterval(() => {
        elapsed += 1000;
        ring.style.strokeDashoffset = String(RING_CIRC * elapsed / INTERVAL_MS);
        if (elapsed >= INTERVAL_MS) clearInterval(ringTimer);
      }, 1000);
    }

    /* ── Animated counter ── */
    function animateCount(el, from, to) {
      const dur = 900, t0 = performance.now();
      (function tick(now) {
        const p = Math.min((now - t0) / dur, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(from + (to - from) * ease).toLocaleString('sv-SE');
        if (p < 1) requestAnimationFrame(tick);
      })(t0);
    }

    /* ── "+N" floater ── */
    function spawnFloater(count) {
      const el = document.createElement('div');
      el.className = 'floater';
      el.textContent = '+' + count;
      el.style.left = (35 + Math.random() * 30) + 'vw';
      el.style.top  = (30 + Math.random() * 30) + 'vh';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }

    /* ── Render ── */
    function render(data) {
      const total = data.totalWords || 0;
      const totalEl = document.getElementById('total');

      if (total !== prevTotal) {
        if (prevTotal > 0 && total > prevTotal) {
          totalEl.classList.add('pop');
          setTimeout(() => totalEl.classList.remove('pop'), 350);
          const diff = total - prevTotal;
          const bursts = Math.min(diff, 6);
          for (let i = 0; i < bursts; i++) {
            setTimeout(() => spawnFloater(i === 0 ? diff : 1), i * 160);
          }
        }
        animateCount(totalEl, prevTotal, total);
        prevTotal = total;
      }

      const students = Object.entries(data.perStudent || {})
        .sort((a, b) => b[1] - a[1]);

      const board = document.getElementById('board');

      if (!students.length) {
        board.innerHTML = '<div class="empty">Inga inlämningar ännu – väntar på eleverna...</div>';
        return;
      }

      const maxCount = students[0][1] || 1;

      board.innerHTML = '';
      students.forEach(([name, count], i) => {
        const row = document.createElement('div');
        row.className = 'row' + (i < 3 ? ' rank-' + (i + 1) : '');

        const badge = document.createElement('div');
        if (i < 3) {
          badge.className = 'rank-badge';
          badge.textContent = MEDALS[i];
        } else {
          badge.className = 'rank-num';
          badge.textContent = i + 1;
        }

        const nameEl = document.createElement('div');
        nameEl.className = 'name';
        nameEl.textContent = name;

        const barWrap = document.createElement('div');
        barWrap.className = 'bar-wrap';
        const bar = document.createElement('div');
        bar.className = 'bar c' + (i % 12);
        bar.style.width = '0%';
        barWrap.appendChild(bar);

        const countCell = document.createElement('div');
        countCell.className = 'count-cell';
        const countNum = document.createElement('span');
        countNum.className = 'count-num';
        countNum.textContent = count.toLocaleString('sv-SE');
        const countUnit = document.createElement('span');
        countUnit.className = 'count-unit';
        countUnit.textContent = 'ord';
        countCell.appendChild(countNum);
        countCell.appendChild(countUnit);

        row.appendChild(badge);
        row.appendChild(nameEl);
        row.appendChild(barWrap);
        row.appendChild(countCell);
        board.appendChild(row);

        requestAnimationFrame(() => requestAnimationFrame(() => {
          bar.style.width = Math.max(1, Math.round(count / maxCount * 100)) + '%';
        }));
      });
    }

    /* ── Data fetch ── */
    function load() {
      google.script.run
        .withSuccessHandler(data => { render(data); startRing(); })
        .withFailureHandler(err  => console.error('Laddningsfel:', err))
        .getDashboardData();
    }

    load();
    setInterval(load, INTERVAL_MS);
  </script>
</body>
</html>
