    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTO3D4vfbGQ8S44SNuhM2-HN3qQd_NStJjucAYQPFVmUEeQBhyMtFxNLzHVynXs1RBZe6OaJdqC7DC3/pub?gid=0&single=true&output=csv';
        let data = [];
        let sections = {};

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const text = await response.text();
                console.log('Mottagen CSV-text:', text.substring(0, 200) + '...'); // Debug: visa början av CSV-texten
                
                const rows = text.split('\n').filter(row => row.trim() !== '');
                console.log('Antal rader:', rows.length);
                
                if (rows.length < 2) {
                    console.warn('För få rader i CSV-filen');
                    return;
                }
                
                data = []; // Rensa tidigare data
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(',');
                    if (cols.length >= 5) {
                        data.push({
                            moment: cols[0].trim(),
                            vecka: cols[1].trim(),
                            dag1: cols[2].trim(),
                            dag2: cols[3].trim(),
                            kommentar: cols.slice(4).join(',').trim()
                        });
                    }
                }
                
                console.log('Parsed data:', data); // Debug: visa datan
                buildMenu();
                buildSections();
                
                // Hantera Omprov separat med checkbox
                const reexamCheckbox = document.getElementById('reexam-checkbox');
                if (reexamCheckbox) {
                    reexamCheckbox.addEventListener('change', function() {
                        document.getElementById('reexam-button').disabled = !this.checked;
                    });
                }
            } catch (error) {
                console.error('Fel vid laddning av data:', error);
                // Visa ett felmeddelande på sidan
                const main = document.querySelector('main');
                const errorDiv = document.createElement('div');
                errorDiv.className = 'intro-text';
                errorDiv.style.color = 'red';
                errorDiv.innerHTML = '<strong>⚠️ Kunde inte ladda planeringen.</strong><br>Kontrollera att Google Sheet är korrekt publicerat som CSV.<br>Tekniskt fel: ' + error.message;
                main.appendChild(errorDiv);
            }
        }

        function buildMenu() {
            const menu = document.getElementById('menu');
            if (!menu) return;
            menu.innerHTML = ''; // Rensa menyn
            
            const moments = [...new Set(data.map(row => row.moment))];
            moments.forEach(moment => {
                if (moment === 'Omprov') return;
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = '#';
                a.dataset.section = moment.toLowerCase().replace(/\s+/g, '-');
                a.textContent = moment;
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    showSection(a.dataset.section);
                    document.querySelectorAll('nav a').forEach(l => l.classList.remove('active'));
                    a.classList.add('active');
                });
                li.appendChild(a);
                menu.appendChild(li);
            });
            
            const reexamLink = document.querySelector('.reexam-link');
            if (reexamLink) {
                reexamLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    showSection('reexam');
                    document.querySelectorAll('nav a').forEach(l => l.classList.remove('active'));
                    reexamLink.classList.add('active');
                });
            }
        }

        function buildSections() {
            const main = document.querySelector('main');
            if (!main) return;
            
            // Ta bort tidigare dynamiska sektioner (men behåll intro och reexam)
            const oldSections = main.querySelectorAll('.section:not(#intro):not(#reexam)');
            oldSections.forEach(s => s.remove());
            
            const moments = [...new Set(data.map(row => row.moment))];
            moments.forEach(moment => {
                if (moment === 'Omprov') return;
                
                const section = document.createElement('div');
                section.id = moment.toLowerCase().replace(/\s+/g, '-');
                section.className = 'section';
                
                const h1 = document.createElement('h1');
                h1.textContent = moment;
                section.appendChild(h1);
                
                const table = document.createElement('table');
                table.innerHTML = `<tr><th>Vecka</th><th>Dag 1</th><th>Dag 2</th><th>Kommentar</th></tr>`;
                const rows = data.filter(row => row.moment === moment);
                rows.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td>${row.vecka}</td><td>${row.dag1}</td><td>${row.dag2}</td><td>${row.kommentar}</td>`;
                    table.appendChild(tr);
                });
                section.appendChild(table);
                main.appendChild(section);
            });
        }

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            if (target) target.classList.add('active');
            if (window.innerWidth <= 768) document.querySelector('nav').classList.remove('open');
        }

        // Initiera när sidan laddas
        loadData();
    </script>
